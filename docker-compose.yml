services:
  postgres:
    image: postgres:15-alpine
    container_name: minileetcode-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: minileetcode
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minileetcode-backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      # FIX: use Docker service name "postgres", never "localhost"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/minileetcode?schema=public
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CLEANUP_ENABLED: "true"
      AUTO_BUILD_SANDBOX_IMAGES: "true"
      SANDBOX_ASSETS_DIR: /usr/src/app/executor
    # FIX: backend does NOT own port 80 — Nginx does that
    # Only expose 5000 internally; no "ports:" needed here
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./executor:/usr/src/app/executor:ro
      - sandbox-tmp:/usr/src/app/tmp
      - ./backend/public:/usr/src/app/public
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/v1/health" ]
      interval: 30s
      start_period: 20s
      timeout: 10s
      retries: 3

  # FIX: Nginx is the ONLY service that binds port 80 on the host
  nginx:
    image: nginx:alpine
    container_name: minileetcode-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres-data:
  sandbox-tmp:


networks:
  app-network:
    driver: bridge
