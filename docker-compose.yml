
services:
  # -----------------------------------------------------------------
  # Postgres Database
  # -----------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: minileetcode-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: minileetcode
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  # -----------------------------------------------------------------
  # Redis Queue & Rate Limit Store
  # -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: minileetcode-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  # -----------------------------------------------------------------
  # Backend API Server
  # -----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minileetcode-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/minileetcode?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super_secret_jwt_key_production
      REFRESH_TOKEN_SECRET: super_secret_refresh_key_production
      FRONTEND_URL: http://localhost:80
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - platform-logs:/usr/src/app/logs
    networks:
      - app-network

  # -----------------------------------------------------------------
  # Execution Worker
  # -----------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: minileetcode-worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/minileetcode?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: submission-queue
      WORKER_CONCURRENCY: 5
    # The worker MUST be able to launch Docker containers.
    # We map the host's docker socket into the worker container (Docker-out-of-Docker).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - minileetcode-tmp:/usr/src/app/tmp # Shared volume for code execution
      - platform-logs:/usr/src/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  # -----------------------------------------------------------------
  # React Frontend
  # -----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minileetcode-frontend
    restart: always
    expose:
      - "80" # Exposed internally to Nginx, but not directly to the host machine
    depends_on:
      - backend
    networks:
      - app-network

  # -----------------------------------------------------------------
  # Nginx API Gateway & Reverse Proxy
  # -----------------------------------------------------------------
  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: minileetcode-gateway
    restart: always
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # -----------------------------------------------------------------
  # Prometheus Monitoring
  # -----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: minileetcode-prometheus
    restart: always
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network

  # -----------------------------------------------------------------
  # Grafana Dashboard
  # -----------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: minileetcode-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Change in prod
    volumes:
      - ./infrastructure/monitoring/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  platform-logs:
  minileetcode-tmp:


networks:
  app-network:
    driver: bridge
