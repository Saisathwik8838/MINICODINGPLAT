name: Node.js CI (Test & Lint)

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    # We need a PostgreSQL service to run Prisma migrations/tests against a real DB
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: minileetcode_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json' # Or package.json if no lock file yet

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run ESLint
      working-directory: ./backend
      run: npm run lint
      continue-on-error: true # Warning only for now
      
    - name: Generate Prisma Client
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/minileetcode_test?schema=public
      run: npx prisma generate

    # Uncomment when tests exist
    # - name: Run Jest Tests
    #   working-directory: ./backend
    #   env:
    #     DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/minileetcode_test?schema=public
    #     JWT_SECRET: testsecret
    #     REFRESH_TOKEN_SECRET: testsecret
    #   run: npm test

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Run React ESLint
      working-directory: ./frontend
      run: npm run lint
      
    - name: Check Build Success
      working-directory: ./frontend
      run: npm run build
