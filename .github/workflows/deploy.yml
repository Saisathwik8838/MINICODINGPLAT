name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Navigate to the project directory
            cd /opt/MINICODINGPLAT
            
            # Pull the latest code
            git pull origin main
            
            # Build the React frontend
            cd frontend
            npm install
            npm run build
            cd ..
            
            # Copy built frontend to backend/public so Express can serve it
            rm -rf backend/public
            cp -r frontend/dist backend/public
            
            # Rebuild the backend and restart containers without downtime for unchanged services
            docker compose build --no-cache backend
            docker compose up -d
            
            # Run database migrations securely inside the backend container
            docker exec minileetcode-backend npx prisma migrate deploy
