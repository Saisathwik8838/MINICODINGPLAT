upstream backend_api {
    server backend:5000;
}

upstream frontend_client {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Compress responses for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Route API requests to the Backend Service
    location /api {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long-running executions (just in case workers take time)
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Route all other traffic to the React Frontend
    location / {
        proxy_pass http://frontend_client;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR (Useful in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Provide a direct Nginx healthcheck
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
    }
}
