global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'minileetcode-backend'
    static_configs:
      - targets: ['backend:5000']

  - job_name: 'minileetcode-worker'
    static_configs:
      - targets: ['worker:5001'] # Worker needs to expose a basic metrics port
